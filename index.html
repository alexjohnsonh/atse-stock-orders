// ── Google Sheets ──
async function fetchSheet(tabName, range) {
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(tabName)}!${range}?key=${CONFIG.API_KEY}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error(`Sheet fetch failed: ${res.status}`);
  return (await res.json()).values||[];
}

async function loadOrders(tabName) {
  const rows=await fetchSheet(tabName,'A2:I100');
  return rows.map(r=>({orderPO:r[0]||'',invNo:r[1]||'',customer:r[2]||'',email:r[3]||'',products:r[4]||'',qty:r[5]||'',dateOrdered:r[6]||'',status:r[7]||'Order Created',lastUpdated:r[8]||''}));
}

async function loadATSStock() {
  const rows=await fetchSheet(CONFIG.ATS_STOCK_TAB,'A1:H50');
  const standard=[],odd=[];let section=null;
  for(let i=0;i<rows.length;i++){
    const r=rows[i];if(!r||r.every(c=>!c))continue;
    const fc=(r[0]||'').trim();
    if(fc==='Standard Stock'){section='standard';continue;}
    if(fc==='Odd Stock'){section='odd';continue;}
    if(section==='standard'){const code=(r[1]||'').trim();if(!code||code==='Product Code')continue;standard.push({sheetRow:i+1,productCode:code,qty:r[2]||'0',qtyInProd:r[3]||'',dueDate:r[4]||'',qtyBackOrder:r[5]||'',who:r[6]||'',notes:r[7]||''});}
    else if(section==='odd'){const code=(r[1]||'').trim();if(!code||code==='Product Code')continue;odd.push({sheetRow:i+1,productCode:code,qty:r[2]||'0',notes:r[3]||''});}
  }
  return{standard,odd};
}

// ── Helpers ──
function parseOrderDate(dateStr) {
  if(!dateStr||dateStr==='-'||dateStr==='—')return null;
  const s=String(dateStr).trim();
  const dmY=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  const d=dmY?new Date(parseInt(dmY[3]),parseInt(dmY[2])-1,parseInt(dmY[1])):new Date(s);
  return isNaN(d)?null:d;
}
function isWithin3Months(dateStr) {
  const d=parseOrderDate(dateStr);if(!d)return true;
  const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-3);
  return d>=cutoff;
}
function cleanProducts(productsStr,qtyStr) {
  const products=productsStr.split(',').map(p=>p.trim()).filter(p=>p&&p!=='-');
  const qtys=qtyStr.split(',').map(q=>q.trim()).filter(q=>q&&q!=='-');
  if(products.length===0)return{display:'—',codes:[],qtys:[]};
  const parts=products.map((p,i)=>qtys[i]&&qtys[i]!=='0'?`${p} (${qtys[i]})`:p);
  return{display:parts.join(', '),codes:products,qtys};
}
function formatDueDate(val) {
  if(!val||val==='-'||val==='—')return'—';
  const s=String(val).trim();
  if(s.includes('/'))return s;
  if(/^\d{4}$/.test(s))return s.slice(0,2)+'/'+s.slice(2);
  if(/^\d{3}$/.test(s))return s.slice(0,1)+'/'+s.slice(1);
  return s;
}
function isStandardATSOrder(productCodes) {
  const stdCodes=state.atsStock.standard.map(s=>s.productCode.toUpperCase());
  return productCodes.every(c=>stdCodes.includes(c.toUpperCase()));
}
function getATSStatusesForOrder(order) {
  const{codes}=cleanProducts(order.products,order.qty);
  if(codes.length===0)return CONFIG.ATS_SPECIAL_STATUSES;
  return isStandardATSOrder(codes)?CONFIG.ATS_STANDARD_STATUSES:CONFIG.ATS_SPECIAL_STATUSES;
}
function hasATSStockAlerts() {
  return state.atsStock.standard.some(s=>(parseInt(s.qty)||0)===0||(parseInt(s.qtyBackOrder)||0)>0);
}
function countryName(code) { return ISO_NAMES[code]||code; }

// ── Stock Deduction ──
function calculateATSStockImpact(order) {
  const{codes,qtys}=cleanProducts(order.products,order.qty);
  const impacts=[];
  codes.forEach((code,i)=>{
    const stockItem=state.atsStock.standard.find(s=>s.productCode.toUpperCase()===code.toUpperCase());
    if(!stockItem)return;
    const orderQty=parseInt(qtys[i])||1;
    const currentQty=parseInt(stockItem.qty)||0;
    const newQty=currentQty-orderQty;
    impacts.push({stockItem,code,orderQty,currentQty,newQty:Math.max(0,newQty),backOrderQty:newQty<0?Math.abs(newQty):0});
  });
  return impacts;
}
async function applyATSStockDeductions(order,impacts) {
  const today=new Date().toLocaleDateString('en-GB');
  for(const impact of impacts){
    const s=impact.stockItem;
    s.qty=String(impact.newQty);
    if(impact.backOrderQty>0){
      const currentBO=parseInt(s.qtyBackOrder)||0;
      s.qtyBackOrder=String(currentBO+impact.backOrderQty);
      const cw=s.who&&s.who!=='—'&&s.who!=='-'?s.who:'';
      s.who=cw?cw+', '+order.customer:order.customer;
      const noteEntry=`${impact.backOrderQty} on back order for ${order.customer} (${order.orderPO}) — ${today}`;
      const cn=s.notes&&s.notes!=='—'&&s.notes!=='-'?s.notes:'';
      s.notes=cn?cn+'; '+noteEntry:noteEntry;
    }
    await updateStock(s.productCode,CONFIG.ATS_STOCK_TAB,{qty:s.qty,qtyBackOrder:s.qtyBackOrder||'-',who:s.who||'-',notes:s.notes||'-'});
  }
}

// ── World Map ──
function geoPathStr(geometry,W,H) {
  const polys=geometry.type==='Polygon'?[geometry.coordinates]:geometry.coordinates;
  let d='';
  polys.forEach(rings=>{
    rings.forEach(ring=>{
      ring.forEach((pt,i)=>{
        const x=((pt[0]+180)*(W/360)).toFixed(1);
        const y=((90-pt[1])*(H/180)).toFixed(1);
        d+=(i===0?'M':'L')+x+','+y;
      });
      d+='Z';
    });
  });
  return d;
}

async function initWorldMap() {
  const mapEl=document.getElementById('world-map');
  if(!mapEl)return;
  if(state.mapFeatures){renderMapPaths(mapEl);return;}
  try {
    const world=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json());
    state.mapFeatures=topojson.feature(world,world.objects.countries).features;
    renderMapPaths(mapEl);
  } catch(e){
    const el=document.getElementById('map-loading');
    if(el)el.innerHTML='⚠️ Could not load map — check connection';
  }
}

function renderMapPaths(mapEl) {
  const W=800,H=400;
  const ns='http://www.w3.org/2000/svg';
  const activeCodes=new Set(state.projects.filter(p=>p.status!=='Archived').map(p=>p.countryCode));
  mapEl.innerHTML='';
  let auFound=false;
  state.mapFeatures.forEach(f=>{
    try {
      // Handle both padded ("036") and unpadded ("36") numeric IDs from TopoJSON
      const idStr=String(f.id);
      const iso=ISO_N2A[idStr]||ISO_N2A[String(parseInt(idStr,10))];
      if(idStr==='36'||idStr==='036'||iso==='AU'){auFound=true;console.log('AU feature found:',idStr,iso,!!f.geometry);}
      if(!iso||!f.geometry)return;
      const d=geoPathStr(f.geometry,W,H);
      if(!d)return;
      const path=document.createElementNS(ns,'path');
      path.setAttribute('d',d);
      path.setAttribute('data-iso',iso);
      path.setAttribute('data-name',ISO_NAMES[iso]||iso);
      path.classList.add('country-path');
      if(activeCodes.has(iso))path.classList.add('has-projects');
      if(iso===state.selectedCountry)path.classList.add('selected-country');
      mapEl.appendChild(path);
    } catch(e) { console.warn('Map feature error:',f.id,e); }
  });
  if(!auFound)console.warn('Australia (ID 36/036) not found in map features at all. Total features:',state.mapFeatures.length);
  const loadEl=document.getElementById('map-loading');
  if(loadEl)loadEl.style.display='none';
  mapEl.style.display='block';
  attachMapEvents();
  renderCountryProjects();
}

function renderMapColors() {
  const activeCodes=new Set(state.projects.filter(p=>p.status!=='Archived').map(p=>p.countryCode));
  document.querySelectorAll('.country-path').forEach(path=>{
    const iso=path.getAttribute('data-iso');
    path.classList.toggle('has-projects',activeCodes.has(iso));
    path.classList.toggle('selected-country',iso===state.selectedCountry);
  });
}

function attachMapEvents() {
  const tooltip=document.getElementById('map-tooltip');
  if(!tooltip)return;
  document.querySelectorAll('.country-path').forEach(path=>{
    const iso=path.getAttribute('data-iso');
    const name=path.getAttribute('data-name');
    path.addEventListener('mouseenter',e=>{
      const projs=state.projects.filter(p=>p.countryCode===iso&&p.status!=='Archived');
      if(!projs.length)return;
      tooltip.innerHTML=`<strong>${name}</strong><br>${projs.map(p=>'· '+p.projectName).join('<br>')}`;
      tooltip.style.display='block';
      positionTooltip(e,tooltip);
    });
    path.addEventListener('mousemove',e=>positionTooltip(e,tooltip));
    path.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
    path.addEventListener('click',()=>{
      const hasProj=state.projects.some(p=>p.countryCode===iso&&p.status!=='Archived');
      if(!hasProj)return;
      state.selectedCountry=state.selectedCountry===iso?null:iso;
      renderMapColors();renderCountryProjects();
    });
    path.addEventListener('touchstart',e=>{
      const hasProj=state.projects.some(p=>p.countryCode===iso&&p.status!=='Archived');
      if(!hasProj)return;
      e.preventDefault();
      state.selectedCountry=state.selectedCountry===iso?null:iso;
      renderMapColors();renderCountryProjects();
      if(state.selectedCountry){
        const projs=state.projects.filter(p=>p.countryCode===iso&&p.status!=='Archived');
        tooltip.innerHTML=`<strong>${name}</strong><br>${projs.map(p=>'· '+p.projectName).join('<br>')}`;
        const r=path.closest('.map-wrap').getBoundingClientRect();
        const t=e.touches[0];
        tooltip.style.left=(t.clientX-r.left+10)+'px';
        tooltip.style.top=(t.clientY-r.top-50)+'px';
        tooltip.style.display='block';
        setTimeout(()=>{tooltip.style.display='none';},2500);
      }
    },{passive:false});
  });
}

function positionTooltip(e,tooltip) {
  const wrap=document.querySelector('.map-wrap');
  if(!wrap)return;
  const r=wrap.getBoundingClientRect();
  let x=e.clientX-r.left+12,y=e.clientY-r.top-45;
  if(x+210>r.width)x=e.clientX-r.left-220;
  if(y<0)y=e.clientY-r.top+12;
  tooltip.style.left=x+'px';tooltip.style.top=y+'px';
}

function renderCountryProjects() {
  const container=document.getElementById('country-projects');
  if(!container)return;
  if(!state.selectedCountry){container.innerHTML='<div class="empty" style="padding:16px 0 0;">Tap a highlighted country to see its projects</div>';return;}
  const name=countryName(state.selectedCountry);
  const projs=state.projects
    .filter(p=>p.countryCode===state.selectedCountry&&p.status!=='Archived')
    .sort((a,b)=>{const da=parseOrderDate(a.date),db=parseOrderDate(b.date);if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da-db;});
  if(!projs.length){container.innerHTML=`<div class="empty" style="padding:16px 0 0;">No active projects in ${name}</div>`;return;}
  let html=`<div class="section-title">${name} — ${projs.length} project${projs.length!==1?'s':''}</div>`;
  projs.forEach(p=>{
    const statusColor=p.status==='Enquiry'?'var(--grey)':p.status==='Quoted'?'var(--amber)':p.status==='Confirmed'?'var(--blue)':'#9CA3AF';

      </div>
      <div class="order-customer">${order.customer}</div>
      <div class="order-product">${display}</div>
      <div class="order-bottom">
        <span style="font-size:13px;font-weight:600;color:${order.status==='Order Confirmed'?'var(--blue)':order.status==='Being Made'?'var(--amber)':order.status==='At Galvanisers'?'var(--purple)':order.status==='Being Packed'?'var(--green)':'var(--grey)'};">${order.status}</span>
        ${canAdvance&&nextStatus?`<span class="status-badge clickable" data-status="${nextStatus}" data-action="advance-status" data-po="${order.orderPO}" data-next="${nextStatus}" data-biz="${business}">${nextStatus}</span>`:''}
      </div>
    </div>`;
}

function renderATSStockView(){
  let html='<div class="section-title">Standard Stock</div>';
  if(state.atsStock.standard.length===0)html+='<div class="empty">No standard stock data</div>';
  state.atsStock.standard.forEach((s,i)=>{
    const editing=state.editingStock===`ats-std-${i}`;
    const qty=parseInt(s.qty)||0,bo=parseInt(s.qtyBackOrder)||0,alert=qty===0||bo>0;
    html+=`<div class="stock-card ${alert?'stock-alert':''}" data-stock-id="ats-std-${i}">
      <div class="stock-code">${s.productCode}${alert?`<span class="stock-alert-badge">⚠️ ${qty===0?'Out of stock':''}${qty===0&&bo>0?' · ':''}${bo>0?bo+' on back order':''}</span>`:''}</div>
      <div class="stock-row"><span class="stock-label">QTY</span><span class="stock-value">${editing?`<input type="number" data-field="qty" value="${s.qty}">`:s.qty}</span></div>
      <div class="stock-row"><span class="stock-label">In Production</span><span class="stock-value">${editing?`<input type="number" data-field="qtyInProd" value="${s.qtyInProd}">`:(s.qtyInProd||'—')}</span></div>
      <div class="stock-row"><span class="stock-label">Due Date</span><span class="stock-value">${editing?`<input type="text" data-field="dueDate" value="${s.dueDate}" placeholder="DD/MM">`:formatDueDate(s.dueDate)}</span></div>
      <div class="stock-row"><span class="stock-label">Back Order</span><span class="stock-value" style="${bo>0?'color:var(--red);':''}">${editing?`<input type="number" data-field="qtyBackOrder" value="${s.qtyBackOrder}">`:(s.qtyBackOrder||'—')}</span></div>
      <div class="stock-row"><span class="stock-label">Who?</span><span class="stock-value">${editing?`<input type="text" data-field="who" value="${s.who}" style="width:160px;">`:(s.who||'—')}</span></div>
      <div class="stock-row"><span class="stock-label">Notes</span><span class="stock-value">${editing?`<input type="text" data-field="notes" value="${s.notes||''}" style="width:160px;">`:(s.notes||'—')}</span></div>
      ${editing?`<div class="stock-save-row"><button class="stock-cancel-btn" data-action="cancel-edit">Cancel</button><button class="stock-save-btn" data-action="save-stock" data-section="ats-standard" data-idx="${i}">Save</button></div>`
        :`<div class="stock-save-row"><button class="stock-save-btn" data-action="edit-stock" data-stock-id="ats-std-${i}" style="background:var(--bg);color:var(--text);">Edit</button></div>`}
    </div>`;
  });
  html+='<div class="section-title">Odd Stock</div>';
  if(state.atsStock.odd.length===0&&!state.addingOddStock)html+='<div class="empty">No odd stock data</div>';
  state.atsStock.odd.forEach((s,i)=>{
    const editing=state.editingStock===`ats-odd-${i}`;
    html+=`<div class="stock-card" data-stock-id="ats-odd-${i}">
      <div class="stock-code">${s.productCode}</div>
      <div class="stock-row"><span class="stock-label">QTY</span><span class="stock-value">${editing?`<input type="number" data-field="qty" value="${s.qty}">`:s.qty}</span></div>
      <div class="stock-row"><span class="stock-label">Notes</span><span class="stock-value">${editing?`<input type="text" data-field="notes" value="${s.notes||''}" style="width:160px;">`:(s.notes||'—')}</span></div>
      ${editing?`<div class="stock-save-row"><button class="stock-cancel-btn" data-action="cancel-edit">Cancel</button><button class="stock-save-btn" data-action="save-stock" data-section="ats-odd" data-idx="${i}">Save</button></div>`
        :`<div class="stock-save-row"><button class="stock-save-btn" data-action="edit-stock" data-stock-id="ats-odd-${i}" style="background:var(--bg);color:var(--text);">Edit</button></div>`}
    </div>`;
  });
  if(state.addingOddStock){
    html+=`<div class="stock-card" style="border:2px dashed var(--primary);">
      <div class="stock-row"><span class="stock-label">Product Code</span><span class="stock-value"><input type="text" id="new-odd-code" placeholder="e.g. WC7575D" style="width:140px;"></span></div>
      <div class="stock-row"><span class="stock-label">QTY</span><span class="stock-value"><input type="number" id="new-odd-qty" value="0"></span></div>
      <div class="stock-row"><span class="stock-label">Notes</span><span class="stock-value"><input type="text" id="new-odd-notes" placeholder="Optional" style="width:160px;"></span></div>
      <div class="stock-save-row"><button class="stock-cancel-btn" data-action="cancel-add-odd">Cancel</button><button class="stock-save-btn" data-action="save-new-odd">Add</button></div>
    </div>`;
  } else {
    html+=`<button data-action="add-odd-stock" style="display:block;width:100%;padding:12px;border-radius:var(--radius);border:2px dashed var(--border);background:none;color:var(--text-muted);font-size:13px;font-weight:600;margin-bottom:10px;">+ Add Odd Stock Product</button>`;
  }
  return html;
}

function renderATSEStockView(){
  let html='<div class="section-title">FlexiBaffle Stock</div>';
  if(state.atseStock.length===0)html+='<div class="empty">No ATSE stock data</div>';
  state.atseStock.forEach((s,i)=>{
    const editing=state.editingStock===`atse-${i}`;
    html+=`<div class="stock-card" data-stock-id="atse-${i}">
      <div class="stock-code">${s.productCode}</div>
      <div class="stock-row"><span class="stock-label">45's & Relief Cuts</span><span class="stock-value">${editing?`<input type="number" data-field="qty45Relief" value="${s.qty45Relief}">`:s.qty45Relief}</span></div>
      <div class="stock-row"><span class="stock-label">45's No Relief Cuts</span><span class="stock-value">${editing?`<input type="number" data-field="qty45NoRelief" value="${s.qty45NoRelief}">`:s.qty45NoRelief}</span></div>
      <div class="stock-row"><span class="stock-label">No 45s or Relief</span><span class="stock-value">${editing?`<input type="number" data-field="qtyNo45" value="${s.qtyNo45}">`:s.qtyNo45}</span></div>
      <div class="stock-row"><span class="stock-label">Notes</span><span class="stock-value">${editing?`<input type="text" data-field="notes" value="${s.notes||''}" style="width:160px;">`:(s.notes||'—')}</span></div>
      ${editing?`<div class="stock-save-row"><button class="stock-cancel-btn" data-action="cancel-edit">Cancel</button><button class="stock-save-btn" data-action="save-stock" data-section="atse" data-idx="${i}">Save</button></div>`
        :`<div class="stock-save-row"><button class="stock-save-btn" data-action="edit-stock" data-stock-id="atse-${i}" style="background:var(--bg);color:var(--text);">Edit</button></div>`}
    </div>`;
  });
  return html;
}

function renderModal(){
  const m=state.modal;
  return`<div class="modal-overlay open" data-action="close-modal">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${m.title}</div>
      <div class="modal-text">${m.text}</div>
      ${m.warning?`<div class="modal-warning">${m.warning}</div>`:''}
      <div class="modal-actions">
        <button class="modal-cancel" data-action="close-modal">Cancel</button>
        <button class="modal-confirm" data-action="confirm-modal">Confirm</button>
      </div>
    </div>
  </div>`;
}

// ── Events ──
function attachEvents(){
  document.querySelectorAll('.login-user-btn').forEach(btn=>{btn.onclick=()=>{state.selectedUser=btn.dataset.user;state.screen='loginPin';state.pin='';state.pinError='';render();};});
  document.querySelectorAll('.pin-btn').forEach(btn=>{
    btn.onclick=()=>{
      const d=btn.dataset.digit;
      if(d==='←'){state.pin=state.pin.slice(0,-1);state.pinError='';render();return;}
      if(state.pin.length>=4)return;
      state.pin+=d;state.pinError='';render();
      if(state.pin.length===4){
        const user=CONFIG.USERS.find(u=>u.name===state.selectedUser&&u.pin===state.pin);
        if(user){state.currentUser=user;state.screen='app';try{localStorage.setItem('atse-user',JSON.stringify({name:user.name,pin:user.pin}));}catch(e){}loadData();}
        else{state.pinError='Wrong PIN';setTimeout(()=>{state.pin='';render();},400);render();}
      }
    };
  });
  document.querySelectorAll('[data-action="back-login"]').forEach(el=>{el.onclick=()=>{state.screen='login';state.pin='';state.pinError='';render();};});
  document.querySelectorAll('[data-action="logout"]').forEach(el=>{el.onclick=()=>{state.screen='login';state.currentUser=null;state.pin='';try{localStorage.removeItem('atse-user');}catch(e){}render();};});
  document.querySelectorAll('.tab-btn').forEach(btn=>{btn.onclick=()=>{state.activeTab=btn.dataset.tab;state.editingStock=null;state.showAllArchived=false;render();};});
  document.querySelectorAll('[data-action="refresh"]').forEach(el=>{el.onclick=()=>loadData();});
  document.querySelectorAll('[data-action="toggle-archived"]').forEach(el=>{el.onclick=()=>{state.showAllArchived=!state.showAllArchived;render();};});

  document.querySelectorAll('[data-action="advance-status"]').forEach(el=>{
    el.onclick=()=>{
      const po=el.dataset.po,next=el.dataset.next,biz=el.dataset.biz;
      const orders=biz==='Advanced Traffic Supplies'?state.atsOrders:state.atseOrders;
      const order=orders.find(o=>o.orderPO===po);
      let warningHtml='',impacts=[];
      if(next==='Order Confirmed'&&order&&biz==='Advanced Traffic Supplies'){
        impacts=calculateATSStockImpact(order);
        const backOrders=impacts.filter(i=>i.backOrderQty>0);
        if(backOrders.length>0){warningHtml='⚠️ Stock warning:<br>'+backOrders.map(i=>`• <strong>${i.code}</strong>: only ${i.currentQty} in stock — ${i.backOrderQty} will go on back order`).join('<br>');}
      }
      state.modal={
        title:'Update Status',text:`Move <strong>${po}</strong> to <strong>${next}</strong>?`,
        warning:warningHtml||null,
        onConfirm:async()=>{
          if(next==='Order Confirmed'&&impacts.length>0)await applyATSStockDeductions(order,impacts);
          const success=await updateStatus(po,next,biz);
          const o=orders.find(o=>o.orderPO===po);
          if(o){o.status=next;o.lastUpdated=new Date().toISOString();}
          state.modal=null;
          showToast(success?`✓ ${po} → ${next}`:'✓ Updated locally');render();
        }
      };render();
    };
  });

  document.querySelectorAll('[data-action="edit-stock"]').forEach(el=>{el.onclick=()=>{state.editingStock=el.dataset.stockId;render();};});
  document.querySelectorAll('[data-action="cancel-edit"]').forEach(el=>{el.onclick=()=>{state.editingStock=null;render();};});
  document.querySelectorAll('[data-action="save-stock"]').forEach(el=>{
    el.onclick=async()=>{
      const section=el.dataset.section,idx=parseInt(el.dataset.idx);
      const inputs=el.closest('.stock-card').querySelectorAll('input');
      const data={};inputs.forEach(inp=>{data[inp.dataset.field]=inp.value||'-';});
      let pc='',tab='';
      if(section==='ats-standard'){Object.assign(state.atsStock.standard[idx],data);pc=state.atsStock.standard[idx].productCode;tab=CONFIG.ATS_STOCK_TAB;}
      else if(section==='ats-odd'){Object.assign(state.atsStock.odd[idx],data);pc=state.atsStock.odd[idx].productCode;tab=CONFIG.ATS_STOCK_TAB;}
      else if(section==='atse'){Object.assign(state.atseStock[idx],data);pc=state.atseStock[idx].productCode;tab=CONFIG.ATSE_STOCK_TAB;}
      const success=await updateStock(pc,tab,data);
      state.editingStock=null;showToast(success?`✓ ${pc} updated`:'✓ Updated locally');render();
    };
  });

  document.querySelectorAll('[data-action="close-modal"]').forEach(el=>{el.onclick=()=>{state.modal=null;render();};});
  document.querySelectorAll('[data-action="confirm-modal"]').forEach(el=>{el.onclick=()=>{if(state.modal?.onConfirm)state.modal.onConfirm();};});
  document.querySelectorAll('[data-action="add-odd-stock"]').forEach(el=>{el.onclick=()=>{state.addingOddStock=true;render();};});
  document.querySelectorAll('[data-action="cancel-add-odd"]').forEach(el=>{el.onclick=()=>{state.addingOddStock=false;render();};});
  document.querySelectorAll('[data-action="save-new-odd"]').forEach(el=>{
    el.onclick=async()=>{
      const code=(document.getElementById('new-odd-code')?.value||'').trim();
      const qty=document.getElementById('new-odd-qty')?.value||'0';
      const notes=(document.getElementById('new-odd-notes')?.value||'').trim();
      if(!code){showToast('⚠️ Enter a product code');return;}
      state.atsStock.odd.push({sheetRow:null,productCode:code,qty,notes});
      const success=await updateStock(code,CONFIG.ATS_STOCK_TAB,{qty,notes,action:'add-odd'});
      state.addingOddStock=false;showToast(success?`✓ ${code} added`:'✓ Added locally');render();
    };
  });

  // Projects
  document.querySelectorAll('[data-action="open-add-project"]').forEach(el=>{el.onclick=()=>{state.showAddProject=true;state.addProjectData={};render();};});
  document.querySelectorAll('[data-action="close-add-project"]').forEach(el=>{el.onclick=()=>{state.showAddProject=false;render();};});
  document.querySelectorAll('[data-action="submit-project"]').forEach(el=>{
    el.onclick=async()=>{
      state.addProjectData={
        projectName:(document.getElementById('proj-name')?.value||'').trim(),
        client:(document.getElementById('proj-client')?.value||'').trim(),
        countryCode:document.getElementById('proj-country')?.value||'',
        date:document.getElementById('proj-date')?.value||'',
        description:(document.getElementById('proj-desc')?.value||'').trim(),
        contact:(document.getElementById('proj-contact')?.value||'').trim(),
        status:document.getElementById('proj-status')?.value||'Enquiry'
      };
      await submitProject();
    };
  });

  // Init map if on projects tab
  if(state.activeTab==='projects'&&!state.loading&&typeof topojson!=='undefined'){
    setTimeout(initWorldMap,0);
  }
}

// ── Init ──
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
try{
  const saved=localStorage.getItem('atse-user');
  if(saved){const user=JSON.parse(saved);const match=CONFIG.USERS.find(u=>u.name===user.name&&u.pin===user.pin);if(match){state.currentUser=match;state.screen='app';loadData();}}
}catch(e){}
render();
</script>
